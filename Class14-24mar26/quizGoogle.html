<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Clone</title>

    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
        }

        .logo {
            width: 200px;
            margin-bottom: 20px;
        }

        #searchbar {
            width: 400px;
            padding: 10px;
            border-radius: 20px;
            border: 1px solid #ccc;
            margin-bottom: 20px;
        }

        .buttons {
            display: flex;
            gap: 10px;
        }

        button {
            padding: 10px 15px;
            border: none;
            background-color: #f8f9fa;
            cursor: pointer;
        }

        footer {
            position: absolute;
            bottom: 0;
            width: 100%;
            text-align: center;
            padding: 10px;
            background: #f2f2f2;
        }
    </style>
</head>

<body>

    <img class="logo" src="https://pngimg.com/uploads/google/google_PNG19644.png" alt="Google">

    <input id="searchbar" type="text" placeholder="Search Google...">

    <div class="buttons">
        <button>Google Search</button>
        <button>I'm Feeling Lucky</button>
    </div>

    <footer>
        <p>Pakistan</p>
        <p>&copy; vipertech</p>
    </footer>

</body>
</html>
